<!DOCTYPE html>
<html lang="te">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memory Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Poppins:wght@300;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0b132b;
            --accent: #00d2ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* Top Header */
        .page-header {
            margin-top: 50px;
            text-align: center;
        }

        .page-title {
            font-family: 'Parisienne', cursive;
            font-size: 4.5rem;
            color: var(--accent);
            margin: 0;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }

        .sub-title {
            font-size: 1.1rem;
            color: #bbb;
            margin-top: -10px;
            letter-spacing: 2px;
        }

        /* Centered Slider */
        .slider-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .slider-container {
            width: 90%;
            max-width: 700px;
            height: 450px;
            position: relative;
            background: var(--glass);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.8s ease-in-out, transform 1s ease-in-out;
            transform: scale(1.1);
        }

        .slide.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Modern Controls */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 25px;
        }

        .control-btn {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 12px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-btn:hover {
            background: var(--accent);
            color: #0b132b;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        /* Navigation to Final Page */
        .final-btn {
            position: absolute;
            bottom: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .final-btn:hover {
            background: var(--accent);
            color: #0b132b;
            border-color: var(--accent);
        }
    </style>
</head>

<body>

    <div class="page-header">
        <h1 class="page-title">Our Memories</h1>
        <p class="sub-title">Mana memories ni ila okasari chudu...</p>
    </div>

    <div class="slider-wrapper">
        <div class="slider-container">
            <img src="pic1.jpeg" class="slide active">
            <img src="pic2.jpeg" class="slide">
            <img src="pic3.jpeg" class="slide">
            <img src="pic4.jpeg" class="slide">
            <img src="pic5.jpeg" class="slide">
        </div>

        <div class="controls">
            <button class="control-btn" onclick="prevSlide()">Back</button>
            <button class="control-btn" onclick="nextSlide()">Next Pic ✨</button>
        </div>
    </div>

    <a href="final_letter.html" class="final-btn">Final Surprise →</a>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));

            if (index >= slides.length) currentSlide = 0;
            else if (index < 0) currentSlide = slides.length - 1;
            else currentSlide = index;

            slides[currentSlide].classList.add('active');
        }

        function nextSlide() {
            showSlide(currentSlide + 1);
        }

        function prevSlide() {
            showSlide(currentSlide - 1);
        }

        // Auto slide every 5 seconds (optional)
        // setInterval(nextSlide, 5000);
    </script>
</body>

</html>
