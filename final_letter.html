<!DOCTYPE html>
<html lang="te">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message for You</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Parisienne&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0b132b;
            /* Midnight theme matching dashboard */
            --paper: #f4e4bc;
            /* Aged paper color */
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Dancing Script', cursive;
            overflow: hidden;
        }

        /* Letter Container with Animation */
        .letter-container {
            width: 85%;
            max-width: 600px;
            height: 70vh;
            background: var(--paper);
            padding: 40px;
            border-radius: 5px;
            box-shadow:
                0 0 20px rgba(0, 0, 0, 0.5),
                inset 0 0 100px rgba(139, 69, 19, 0.2);
            position: relative;
            transform: rotate(-1deg);
            animation: unfold 2s ease-out;
            overflow-y: auto;
            border-left: 1px solid rgba(0, 0, 0, 0.1);
        }

        /* Old Paper Texture/Stains */
        .letter-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            opacity: 0.5;
            pointer-events: none;
        }

        .letter-title {
            font-family: 'Parisienne', cursive;
            font-size: 2.5rem;
            color: #5d4037;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(93, 64, 55, 0.3);
            padding-bottom: 10px;
        }

        .letter-content {
            font-size: 1.5rem;
            line-height: 1.8;
            color: #3e2723;
            white-space: pre-line;
            /* Keeps line breaks */
        }

        .signature {
            margin-top: 40px;
            text-align: right;
            font-size: 1.8rem;
            color: #5d4037;
        }

        /* Animation: Unfolding the letter */
        @keyframes unfold {
            0% {
                transform: scaleY(0) rotate(-5deg);
                opacity: 0;
            }

            100% {
                transform: scaleY(1) rotate(-1deg);
                opacity: 1;
            }
        }

        /* Next Button on Letter */
        .final-next {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #00d2ff;
            color: #0b132b;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3);
            transition: 0.3s;
        }

        .final-next:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div class="letter-container">
        <h1 class="letter-title">Dear Rani... ✍️</h1>
        <div id="letterBody" class="letter-content"></div>
        <div class="signature">- Ni Bestie</div>
    </div>

    <a href="final.html" class="final-next">The Final Surprise →</a>

    <script>
        const message = `Rani, mana friendship gurinchi cheppali ante ee chinna letter saripodu. 
        
        Kalisina roju nundi ivvala varaku manam chesina picchi panulu, navvukunna kshanalu epatiki marchipolenu. 
        
        Nuvvu pakkana unte chalu, em kastam vachina easy ga dhati vellochu ane confidence untundi. Life lo entha mandhi vachina, ni place mathram special!
        
        Happy Birthday once again ra! Mana friendship epatiki ilaage undali. ❤️`;

        let i = 0;
        function typeLetter() {
            if (i < message.length) {
                document.getElementById("letterBody").innerHTML += message.charAt(i);
                i++;
                setTimeout(typeLetter, 40); // Slightly slower for letter feel
            }
        }

        window.onload = typeLetter;
    </script>
</body>

</html>
